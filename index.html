<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Capital | Investment Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for Data Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Development versions for Babel standalone) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation (Perfect for GitHub Pages without build steps) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-in-right': 'slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideInRight: {
                            '0%': { opacity: '0', transform: 'translateX(-20px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Glassmorphism utilities */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 text-slate-900 dark:text-slate-100 selection:bg-brand-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- MOCK DATA & CONFIG ---
        const INITIAL_INVESTMENT = 5500;
        const START_DATE = new Date(Date.now() - (15 * 24 * 60 * 60 * 1000)); // 15 days ago

        const getLockInDays = (amount) => {
            if (amount >= 5000) return 150;
            if (amount >= 1000) return 240;
            return 365;
        };

        const generate33DayCurve = () => {
            const weights = Array.from({ length: 33 }, () => Math.random() * 0.8 + 0.2);
            const totalWeight = weights.reduce((a, b) => a + b, 0);
            return weights.map(w => Math.pow(1.03, w / totalWeight) - 1); 
        };

        const INITIAL_YIELD_CURVE = generate33DayCurve();

        const MOCK_USER = {
            name: "Alexander Reed",
            email: "alexander.r@example.com",
            kycStatus: "Verified",
            joinDate: START_DATE,
            referralCode: "NOVA-XR782Q",
            accountType: "Institutional Standard"
        };

        const formatCurrency = (val) => {
            const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
            return formatted.replace('$', '₮') + ' USDT';
        };
        
        const formatDate = (date) => new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(date);

        // --- COMPONENTS ---

        function PortfolioChart({ historyData, isDark }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                const ctx = chartRef.current.getContext('2d');
                
                // Gradient Fill
                const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                gradient.addColorStop(0, isDark ? 'rgba(59, 130, 246, 0.5)' : 'rgba(37, 99, 235, 0.2)');
                gradient.addColorStop(1, isDark ? 'rgba(59, 130, 246, 0)' : 'rgba(37, 99, 235, 0)');

                const labels = historyData.map((_, i) => `Day ${i + 1}`);
                const dataPoints = historyData.map(d => d.balance);

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Portfolio Value (USDT)',
                            data: dataPoints,
                            borderColor: isDark ? '#60a5fa' : '#2563eb',
                            backgroundColor: gradient,
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            intersect: false,
                            mode: 'index',
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: isDark ? '#1e293b' : '#ffffff',
                                titleColor: isDark ? '#f8fafc' : '#0f172a',
                                bodyColor: isDark ? '#cbd5e1' : '#475569',
                                borderColor: isDark ? '#334155' : '#e2e8f0',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        return formatCurrency(context.parsed.y);
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                display: false,
                            },
                            y: {
                                border: { display: false },
                                grid: {
                                    color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)',
                                    drawTicks: false,
                                },
                                ticks: {
                                    color: isDark ? '#94a3b8' : '#64748b',
                                    callback: function(value) {
                                        return '₮' + value.toLocaleString();
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [historyData, isDark]);

            return (
                <div className="relative h-64 w-full">
                    <canvas ref={chartRef}></canvas>
                </div>
            );
        }

        function App() {
            // Theme State
            const [isDark, setIsDark] = useState(false);
            
            // Navigation State
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Core Financial State
            const [balance, setBalance] = useState(INITIAL_INVESTMENT);
            const [dailyProfit, setDailyProfit] = useState(0);
            const [totalProfit, setTotalProfit] = useState(0);
            const [recentTrades, setRecentTrades] = useState([]);
            const [chartHistory, setChartHistory] = useState([]);
            
            // Notifications State
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'success') => {
                const id = Math.random().toString(36).substr(2, 9);
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };
            
            // Yield & Contract State
            const [currentDay, setCurrentDay] = useState(15);
            const [yieldCurve, setYieldCurve] = useState(INITIAL_YIELD_CURVE);
            const [activeContracts, setActiveContracts] = useState([
                { id: 'c-1', amount: INITIAL_INVESTMENT, lockInDays: getLockInDays(INITIAL_INVESTMENT), startDate: START_DATE }
            ]);
            
            const [transactions, setTransactions] = useState([
                { id: 'tx-1', type: 'Deposit', amount: INITIAL_INVESTMENT, date: START_DATE, status: 'Completed' }
            ]);
            
            const [isDepositModalOpen, setIsDepositModalOpen] = useState(false);
            const [isWithdrawModalOpen, setIsWithdrawModalOpen] = useState(false);

            // Computed values
            const primaryContract = activeContracts[activeContracts.length - 1] || activeContracts[0];
            const daysLeft = primaryContract ? Math.max(0, primaryContract.lockInDays - currentDay) : 0;
            const lockProgress = primaryContract ? Math.min(100, (currentDay / primaryContract.lockInDays) * 100) : 100;
            const lockedAmount = activeContracts.reduce((sum, c) => sum + c.amount, 0);
            const availableAmount = balance - lockedAmount;

            useEffect(() => {
                // Apply theme
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDark]);

            useEffect(() => {
                // Generate historical data
                let currentTotalProfit = 0;
                let currentBal = INITIAL_INVESTMENT;
                const initialHistory = [];
                
                const initialTrades = Array.from({ length: 15 }).map((_, i) => {
                    const dayIndex = i % 33;
                    const dailyRate = INITIAL_YIELD_CURVE[dayIndex];
                    const profit = INITIAL_INVESTMENT * dailyRate;
                    currentTotalProfit += profit;
                    currentBal += profit;
                    
                    initialHistory.push({ day: i, balance: currentBal, profit });
                    
                    return {
                        id: `day-${i}`,
                        pair: `Yield Cycle - Day ${dayIndex + 1}/33`,
                        type: 'YIELD DIST',
                        profit: profit,
                        date: new Date(START_DATE.getTime() + i * 24 * 3600000)
                    };
                }).reverse();
                
                setRecentTrades(initialTrades.slice(0, 10));
                setTotalProfit(currentTotalProfit);
                setBalance(currentBal);
                setChartHistory(initialHistory);

                // Start Live Simulation Loop
                const interval = setInterval(() => {
                    setCurrentDay(prevDay => {
                        const newDay = prevDay + 1;
                        const cycleDay = (newDay - 1) % 33;
                        
                        setActiveContracts(contracts => {
                            const activePrincipal = contracts.reduce((sum, c) => sum + c.amount, 0);
                            setYieldCurve(prevCurve => {
                                const activeCurve = cycleDay === 0 ? generate33DayCurve() : prevCurve;
                                const generatedProfit = activePrincipal * activeCurve[cycleDay];
                                
                                setDailyProfit(generatedProfit);
                                setTotalProfit(prevTotal => prevTotal + generatedProfit);
                                setBalance(prevBalance => {
                                    const newBal = prevBalance + generatedProfit;
                                    setChartHistory(prevHist => [...prevHist, { day: newDay, balance: newBal, profit: generatedProfit }].slice(-30));
                                    return newBal;
                                });
                                
                                setRecentTrades(prevTrades => [{
                                    id: `day-${newDay}`,
                                    pair: `Yield Cycle - Day ${cycleDay + 1}/33`,
                                    type: 'YIELD DIST',
                                    profit: generatedProfit,
                                    date: new Date()
                                }, ...prevTrades].slice(0, 10));
                                
                                return activeCurve;
                            });
                            return contracts;
                        });
                        return newDay;
                    });
                }, 8000); // Update every 8 seconds to simulate daily tick

                return () => clearInterval(interval);
            }, []);

            const handleDeposit = (amount) => {
                setBalance(prev => prev + amount);
                const lockDays = getLockInDays(amount);
                setActiveContracts(prev => [...prev, {
                    id: `c-${Math.random().toString(36).substr(2, 9)}`,
                    amount: amount,
                    lockInDays: lockDays,
                    startDate: new Date()
                }]);
                setTransactions(prev => [{
                    id: `tx-${Math.random().toString(36).substr(2, 9)}`,
                    type: 'Deposit',
                    amount: amount,
                    date: new Date(),
                    status: 'Completed'
                }, ...prev]);
                
                // Update chart to reflect sudden spike
                setChartHistory(prev => {
                    const last = prev[prev.length - 1];
                    return [...prev, { day: currentDay + 0.1, balance: last.balance + amount, profit: 0 }];
                });
                
                addToast(`Successfully deposited ${formatCurrency(amount)}`, 'success');
            };

            const handleWithdraw = (amount) => {
                setBalance(prev => prev - amount);
                setTransactions(prev => [{
                    id: `tx-${Math.random().toString(36).substr(2, 9)}`,
                    type: 'Withdrawal',
                    amount: amount,
                    date: new Date(),
                    status: 'Completed'
                }, ...prev]);
                
                setChartHistory(prev => {
                    const last = prev[prev.length - 1];
                    return [...prev, { day: currentDay + 0.1, balance: last.balance - amount, profit: 0 }];
                });

                addToast(`Successfully withdrew ${formatCurrency(amount)}`, 'info');
            };

            const navItems = [
                { id: 'dashboard', label: 'Overview', icon: 'fa-chart-pie' },
                { id: 'wallet', label: 'Transfers & Activity', icon: 'fa-wallet' },
                { id: 'referrals', label: 'Partner Program', icon: 'fa-users' },
                { id: 'profile', label: 'Account Settings', icon: 'fa-user-circle' },
            ];

            return (
                <div className="min-h-screen flex overflow-hidden bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-100 via-slate-50 to-slate-200 dark:from-slate-800 dark:via-slate-900 dark:to-slate-950">
                    
                    {/* Toast Container */}
                    <div className="fixed top-4 right-4 z-[9999] space-y-3 flex flex-col items-end">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`animate-slide-in-right flex items-center space-x-3 px-4 py-3 rounded-xl shadow-lg border ${
                                toast.type === 'success' ? 'bg-green-50 border-green-200 text-green-800 dark:bg-green-900/30 dark:border-green-800 dark:text-green-300' :
                                'bg-blue-50 border-blue-200 text-blue-800 dark:bg-blue-900/30 dark:border-blue-800 dark:text-blue-300'
                            }`}>
                                <i className={`fas ${toast.type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} text-lg`}></i>
                                <span className="font-medium text-sm">{toast.message}</span>
                            </div>
                        ))}
                    </div>

                    {}
                    <aside className="hidden md:flex flex-col w-64 glass border-r border-slate-200/50 dark:border-slate-700/50 z-20 relative transition-all duration-300">
                        <div className="p-6 flex justify-between items-center group">
                            <div className="flex items-center space-x-3 cursor-pointer hover:scale-105 transition-transform">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/30">
                                    <i className="fas fa-building text-white text-lg"></i>
                                </div>
                                <span className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 tracking-tight">
                                    Nova Capital
                                </span>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-4 space-y-2">
                            {navItems.map((item, index) => {
                                const isActive = activeTab === item.id;
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 text-sm font-medium animate-fade-in-up ${
                                            isActive 
                                                ? 'bg-brand-50 text-brand-700 dark:bg-brand-900/40 dark:text-brand-300 shadow-sm' 
                                                : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 hover:text-slate-900 dark:hover:text-white'
                                        }`}
                                        style={{ animationDelay: `${index * 50}ms` }}
                                    >
                                        <i className={`fas ${item.icon} w-5 text-center ${isActive ? 'text-brand-600 dark:text-brand-400' : 'opacity-70'}`}></i>
                                        <span>{item.label}</span>
                                    </button>
                                );
                            })}
                        </nav>

                        <div className="p-4 border-t border-slate-200/50 dark:border-slate-700/50">
                            <button 
                                onClick={() => setIsDark(!isDark)}
                                className="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-slate-100/50 dark:bg-slate-800/50 hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors text-sm font-medium text-slate-700 dark:text-slate-300"
                            >
                                <div className="flex items-center space-x-3">
                                    <i className={`fas ${isDark ? 'fa-sun' : 'fa-moon'} w-5 text-center`}></i>
                                    <span>{isDark ? 'Light Mode' : 'Dark Mode'}</span>
                                </div>
                            </button>
                        </div>
                    </aside>

                    {}
                    <div className="md:hidden fixed top-0 left-0 right-0 h-16 glass border-b border-slate-200/50 dark:border-slate-700/50 z-50 flex items-center justify-between px-4">
                        <div className="flex items-center space-x-2">
                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
                                <i className="fas fa-building text-white text-sm"></i>
                            </div>
                            <span className="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Nova Capital</span>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button onClick={() => setIsDark(!isDark)} className="text-slate-600 dark:text-slate-400">
                                <i className={`fas ${isDark ? 'fa-sun' : 'fa-moon'} text-lg`}></i>
                            </button>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-slate-600 dark:text-slate-400 transition-colors">
                                <i className={`fas ${isMobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i>
                            </button>
                        </div>
                    </div>

                    {/* Mobile Menu */}
                    {isMobileMenuOpen && (
                        <div className="md:hidden fixed inset-0 top-16 glass z-40 p-4 animate-fade-in-up">
                            <nav className="space-y-2">
                                {navItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center space-x-3 px-4 py-4 rounded-xl transition-colors font-medium ${
                                            activeTab === item.id ? 'bg-brand-50 text-brand-700 dark:bg-brand-900/50 dark:text-brand-300' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'
                                        }`}
                                    >
                                        <i className={`fas ${item.icon} w-5 text-center`}></i>
                                        <span>{item.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    )}

                    {}
                    <main className="flex-1 flex flex-col h-screen overflow-y-auto overflow-x-hidden pt-16 md:pt-0 relative">
                        <div className="flex-1 p-6 lg:p-10 max-w-7xl mx-auto w-full relative z-10">
                            
                            <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-6 animate-fade-in-up">
                                <div>
                                    <h1 className="text-3xl md:text-4xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">
                                        {activeTab === 'dashboard' && 'Portfolio Overview'}
                                        {activeTab === 'wallet' && 'Liquidity Management'}
                                        {activeTab === 'referrals' && 'Partner Program'}
                                        {activeTab === 'profile' && 'Account Settings'}
                                    </h1>
                                    <p className="text-slate-500 dark:text-slate-400 text-sm md:text-base max-w-2xl">
                                        {activeTab === 'dashboard' && 'Real-time performance tracking of your algorithmic yields.'}
                                        {activeTab === 'wallet' && 'Manage your liquidity, view transaction history, and initiate secure transfers.'}
                                        {activeTab === 'referrals' && 'Invite eligible clients to earn institutional yield bonuses continuously.'}
                                        {activeTab === 'profile' && 'Manage your profile, security preferences, and compliance status.'}
                                    </p>
                                </div>
                                
                                {activeTab === 'dashboard' && (
                                    <div className="flex space-x-3">
                                        <button 
                                            onClick={() => setIsDepositModalOpen(true)}
                                            className="px-5 py-2.5 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white text-sm font-medium rounded-xl shadow-lg shadow-brand-500/25 transition-all hover:scale-105 flex items-center space-x-2"
                                        >
                                            <i className="fas fa-arrow-down"></i>
                                            <span>Deposit</span>
                                        </button>
                                        <button 
                                            onClick={() => setIsWithdrawModalOpen(true)}
                                            className="px-5 py-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-medium rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm transition-all hover:scale-105 flex items-center space-x-2"
                                        >
                                            <i className="fas fa-arrow-up"></i>
                                            <span>Withdraw</span>
                                        </button>
                                    </div>
                                )}
                            </header>

                            <div className="relative">
                                {activeTab === 'dashboard' && (
                                    <DashboardView 
                                        balance={balance} 
                                        dailyProfit={dailyProfit} 
                                        totalProfit={totalProfit} 
                                        recentTrades={recentTrades} 
                                        daysLeft={daysLeft}
                                        lockProgress={lockProgress}
                                        chartHistory={chartHistory}
                                        isDark={isDark}
                                    />
                                )}
                                {activeTab === 'wallet' && (
                                    <WalletView 
                                        balance={balance} 
                                        totalProfit={totalProfit}
                                        transactions={transactions}
                                        onOpenDeposit={() => setIsDepositModalOpen(true)}
                                        onOpenWithdraw={() => setIsWithdrawModalOpen(true)}
                                        availableAmount={availableAmount}
                                        lockedAmount={lockedAmount}
                                        activeContracts={activeContracts}
                                    />
                                )}
                                {activeTab === 'referrals' && <ReferralView />}
                                {activeTab === 'profile' && <ProfileView />}
                            </div>
                        </div>
                    </main>

                    {/* Modals */}
                    <DepositModal 
                        isOpen={isDepositModalOpen} 
                        onClose={() => setIsDepositModalOpen(false)} 
                        onConfirm={handleDeposit} 
                        availableAmount={availableAmount}
                    />
                    <WithdrawModal 
                        isOpen={isWithdrawModalOpen} 
                        onClose={() => setIsWithdrawModalOpen(false)} 
                        onConfirm={handleWithdraw}
                        availableAmount={availableAmount}
                        lockedAmount={lockedAmount}
                    />
                </div>
            );
        }

        function DashboardView({ balance, dailyProfit, totalProfit, recentTrades, daysLeft, lockProgress, chartHistory, isDark }) {
            return (
                <div className="space-y-6">
                    {/* Top Stats Row */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard 
                            title="Total Net Asset Value"

                                        <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide">Account Tier</label>
                                        <div className="px-4 py-3 bg-gradient-to-r from-brand-50 to-transparent dark:from-brand-900/20 border border-brand-100 dark:border-brand-800/50 rounded-xl text-brand-700 dark:text-brand-300 font-bold flex items-center">
                                            <i className="fas fa-star mr-2 text-brand-500"></i>
                                            {MOCK_USER.accountType}
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide">Client Since</label>
                                        <div className="px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-300 font-medium">
                                            {formatDate(MOCK_USER.joinDate).split(',')[0]}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <hr className="border-slate-200 dark:border-slate-700/50" />
                            
                            <div>
                                <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">Security Settings</h3>
                                <button className="group flex items-center justify-between w-full p-4 bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 rounded-xl hover:border-brand-300 dark:hover:border-brand-700 hover:shadow-md transition-all">
                                    <div className="flex items-center space-x-4">
                                        <div className="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-700 flex items-center justify-center group-hover:bg-brand-50 dark:group-hover:bg-brand-900/30 transition-colors">
                                            <i className="fas fa-lock text-slate-500 dark:text-slate-400 group-hover:text-brand-600 dark:group-hover:text-brand-400 text-lg"></i>
                                        </div>
                                        <div className="text-left">
                                            <div className="font-bold text-slate-900 dark:text-white text-base">Update Password</div>
                                            <div className="text-sm text-slate-500 dark:text-slate-400">Modify your secure login credentials</div>
                                        </div>
                                    </div>
                                    <i className="fas fa-chevron-right text-slate-400 group-hover:text-brand-500 group-hover:translate-x-1 transition-all"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function DepositModal({ isOpen, onClose, onConfirm, availableAmount }) {
            const [amount, setAmount] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                const val = parseFloat(amount);
                if (val > 0) {
                    setIsProcessing(true);
                    setTimeout(() => {
                        onConfirm(val);
                        setIsProcessing(false);
                        setAmount('');
                        onClose();
                    }, 1200); 
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in-up" style={{ animationDuration: '0.2s' }}>
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl w-full max-w-md shadow-2xl overflow-hidden transform scale-100 transition-transform">
                        <div className="p-6 md:p-8">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-2xl font-bold text-slate-900 dark:text-white tracking-tight flex items-center">
                                    <i className="fas fa-arrow-down-circle text-brand-500 mr-3"></i> Deposit Funds
                                </h3>
                                <button onClick={onClose} className="text-slate-400 hover:text-slate-700 dark:hover:text-white transition-colors bg-slate-100 dark:bg-slate-800 w-8 h-8 rounded-full flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-slate-700 dark:text-slate-300">Amount (USDT)</label>
                                    <div className="relative">
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-lg">₮</span>
                                        <input 
                                            type="number" 
                                            required
                                            min="100"
                                            step="100"
                                            value={amount}
                                            onChange={(e) => setAmount(e.target.value)}
                                            placeholder="1,000"
                                            className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 focus:border-brand-500 dark:focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 rounded-xl pl-10 pr-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 outline-none transition-shadow text-xl font-bold"
                                        />
                                    </div>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 font-medium">Minimum deposit: 100.00 USDT</p>
                                </div>

                                <div className="bg-brand-50 dark:bg-brand-900/20 border border-brand-100 dark:border-brand-800/50 rounded-xl p-5 flex items-start space-x-4">
                                    <i className="fas fa-lock text-brand-500 text-lg mt-0.5"></i>
                                    <div className="text-sm text-brand-900 dark:text-brand-200 leading-relaxed w-full">
                                        <span className="font-bold">Dynamic Vesting Terms:</span>
                                        <ul className="mt-2 space-y-1 font-medium opacity-90">
                                            <li className="flex items-center"><i className="fas fa-circle text-[6px] mr-2"></i> 5 Months (≥ 5,000 USDT)</li>
                                            <li className="flex items-center"><i className="fas fa-circle text-[6px] mr-2"></i> 8 Months (1,000 - 4,999 USDT)</li>
                                            <li className="flex items-center"><i className="fas fa-circle text-[6px] mr-2"></i> 12 Months (&lt; 1,000 USDT)</li>
                                        </ul>
                                    </div>
                                </div>

                                <button 
                                    type="submit" 
                                    disabled={isProcessing || !amount || parseFloat(amount) < 100}
                                    className="w-full py-4 bg-slate-900 dark:bg-brand-600 hover:bg-slate-800 dark:hover:bg-brand-500 text-white font-bold rounded-xl shadow-lg transition-all flex justify-center items-center disabled:opacity-50 disabled:cursor-not-allowed hover:-translate-y-0.5"
                                >
                                    {isProcessing ? <i className="fas fa-circle-notch fa-spin text-xl"></i> : 'Execute Deposit'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        function WithdrawModal({ isOpen, onClose, onConfirm, availableAmount, lockedAmount }) {
            const [amount, setAmount] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                const val = parseFloat(amount);
                if (val > 0 && val <= availableAmount) {
                    setIsProcessing(true);
                    setTimeout(() => {
                        onConfirm(val);
                        setIsProcessing(false);
                        setAmount('');
                        onClose();
                    }, 1200); 
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in-up" style={{ animationDuration: '0.2s' }}>
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl w-full max-w-md shadow-2xl overflow-hidden transform scale-100 transition-transform">
                        <div className="p-6 md:p-8">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-2xl font-bold text-slate-900 dark:text-white tracking-tight flex items-center">
                                    <i className="fas fa-arrow-up-circle text-slate-700 dark:text-slate-300 mr-3"></i> Withdraw Funds
                                </h3>
                                <button onClick={onClose} className="text-slate-400 hover:text-slate-700 dark:hover:text-white transition-colors bg-slate-100 dark:bg-slate-800 w-8 h-8 rounded-full flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div className="bg-slate-50 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 rounded-xl p-5 mb-2">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-sm text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wide">Available Liquid</span>
                                        <span className="text-xl font-bold text-emerald-600 dark:text-emerald-400">{formatCurrency(availableAmount)}</span>
                                    </div>
                                    <div className="h-px w-full bg-slate-200 dark:bg-slate-700 mb-3"></div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs text-slate-400 font-medium"><i className="fas fa-lock mr-1"></i> Locked Principal:</span>
                                        <span className="text-xs font-bold text-slate-500 dark:text-slate-300">{formatCurrency(lockedAmount)}</span>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-slate-700 dark:text-slate-300">Amount (USDT)</label>
                                    <div className="relative">
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-lg">₮</span>
                                        <input 
                                            type="number" 
                                            required
                                            min="10"
                                            max={availableAmount}
                                            step="10"
                                            value={amount}
                                            onChange={(e) => setAmount(e.target.value)}
                                            placeholder="0.00"
                                            className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 focus:border-emerald-500 dark:focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 rounded-xl pl-10 pr-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 outline-none transition-shadow text-xl font-bold"
                                        />
                                    </div>
                                    <div className="flex justify-between">
                                        <p className="text-xs text-slate-500 dark:text-slate-400 font-medium">Network fee: 1.00 USDT</p>
                                        <button type="button" onClick={() => setAmount(availableAmount)} className="text-xs font-bold text-brand-600 dark:text-brand-400 hover:underline">MAX</button>
                                    </div>
                                </div>

                                <button 
                                    type="submit" 
                                    disabled={isProcessing || !amount || parseFloat(amount) > availableAmount || availableAmount <= 0}
                                    className="w-full py-4 bg-slate-900 dark:bg-white hover:bg-slate-800 dark:hover:bg-slate-100 text-white dark:text-slate-900 font-bold rounded-xl shadow-lg transition-all flex justify-center items-center disabled:opacity-50 disabled:cursor-not-allowed hover:-translate-y-0.5"
                                >
                                    {isProcessing ? <i className="fas fa-circle-notch fa-spin text-xl"></i> : 'Confirm Withdrawal'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
