<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zennith Capital | Investment Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for Data Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Development versions for Babel standalone) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4',   // Greenish-emerald spectrum light theme background
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#10b981',  // Main brand accent emerald
                            600: '#059669',
                            700: '#047857',
                            900: '#064e3b',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-in-right': 'slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideInRight: {
                            '0%': { opacity: '0', transform: 'translateX(-20px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Premium Green-accented Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }
        
        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        /* Custom Modern Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #a7f3d0;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #064e3b;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #10b981;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-emerald-50/30 dark:bg-slate-950 transition-colors duration-300 text-slate-900 dark:text-slate-100 selection:bg-brand-500 selection:text-white">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- STREAMING_CHUNK: Initializing Fresh Account Configuration Constants ---
        const INITIAL_INVESTMENT = 5000; // Starter account exactly $5,000
        const START_DATE = new Date(Date.now() - (24 * 60 * 60 * 1000)); // Registered & funded 1 day ago

        const getLockInDays = (amount) => {
            if (amount >= 5000) return 150; // $5k or more gets 150-day premium cycle
            if (amount >= 1000) return 240;
            return 365;
        };

        const MOCK_USER = {
            name: "Alexander Reed",
            email: "alexander.r@example.com",
            kycStatus: "Verified",
            joinDate: START_DATE,
            referralCode: "ZENNITH-ZC5000",
            accountType: "Institutional Starter"
        };

        const formatCurrency = (val) => {
            const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
            return formatted.replace('$', '₮') + ' USDT';
        };
        
        const formatDate = (date) => new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(date);

        // --- STREAMING_CHUNK: Building Fresh Portfolio Chart Component ---
        function PortfolioChart({ historyData, isDark }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                const ctx = chartRef.current.getContext('2d');
                
                // Pure Emerald Glow Gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                gradient.addColorStop(0, isDark ? 'rgba(16, 185, 129, 0.4)' : 'rgba(16, 185, 129, 0.15)');
                gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');

                const labels = historyData.map(d => `Day ${d.day}`);
                const dataPoints = historyData.map(d => d.balance);

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Portfolio Balance (USDT)',
                            data: dataPoints,
                            borderColor: '#10b981', // Solid Emerald Border
                            backgroundColor: gradient,
                            borderWidth: 3,
                            pointRadius: 4,
                            pointBackgroundColor: '#10b981',
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            intersect: false,
                            mode: 'index',
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: isDark ? '#0f172a' : '#ffffff',
                                titleColor: isDark ? '#f8fafc' : '#0f172a',
                                bodyColor: isDark ? '#cbd5e1' : '#475569',
                                borderColor: 'rgba(16, 185, 129, 0.3)',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        return formatCurrency(context.parsed.y);
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { color: isDark ? '#94a3b8' : '#64748b' }
                            },
                            y: {
                                border: { display: false },
                                grid: {
                                    color: isDark ? 'rgba(16,185,129,0.05)' : 'rgba(16,185,129,0.03)',
                                    drawTicks: false,
                                },
                                ticks: {
                                    color: isDark ? '#94a3b8' : '#64748b',
                                    callback: function(value) {
                                        return '₮' + value.toLocaleString();
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [historyData, isDark]);

            return (
                <div className="relative h-64 w-full">
                    <canvas ref={chartRef}></canvas>
                </div>
            );
        }

        // --- STREAMING_CHUNK: Designing Core Application Container & Navigation... ---
        function App() {
            const [isDark, setIsDark] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Starter Account Financial State setup
            const [balance, setBalance] = useState(INITIAL_INVESTMENT);
            const [dailyProfit, setDailyProfit] = useState(0); // Day 1: Yield pending calculation
            const [totalProfit, setTotalProfit] = useState(0); // Fresh account: No yield generated yet
            const [recentTrades, setRecentTrades] = useState([]); // Empty log for fresh starter accounts
            
            // Clean Chart history showing the initial deposit event from Day 0 (pre-funded) to Day 1 (fully funded)
            const [chartHistory, setChartHistory] = useState([
                { day: 0, balance: 0, profit: 0 },
                { day: 1, balance: INITIAL_INVESTMENT, profit: 0 }
            ]);
            
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'success') => {
                const id = Math.random().toString(36).substr(2, 9);
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };
            
            // Capital Contract: Day 1 of 150
            const [currentDay, setCurrentDay] = useState(1);
            const [activeContracts, setActiveContracts] = useState([
                { id: 'c-1', amount: INITIAL_INVESTMENT, lockInDays: getLockInDays(INITIAL_INVESTMENT), startDate: START_DATE }
            ]);
            
            // Initial funding record
            const [transactions, setTransactions] = useState([
                { id: 'tx-1', type: 'Deposit', amount: INITIAL_INVESTMENT, date: START_DATE, status: 'Completed' }
            ]);
            
            const [isDepositModalOpen, setIsDepositModalOpen] = useState(false);
            const [isWithdrawModalOpen, setIsWithdrawModalOpen] = useState(false);

            // Computed values
            const primaryContract = activeContracts[0];
            const daysLeft = primaryContract ? Math.max(0, primaryContract.lockInDays - (currentDay - 1)) : 0;
            const lockProgress = primaryContract ? Math.min(100, ((currentDay - 1) / primaryContract.lockInDays) * 100) : 0;
            const lockedAmount = activeContracts.reduce((sum, c) => sum + c.amount, 0);
            const availableAmount = balance - lockedAmount;

            useEffect(() => {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDark]);

            // --- STREAMING_CHUNK: Constructing Dashboard Sidebar and Main Layout ---
            const navItems = [
                { id: 'dashboard', label: 'Overview', icon: 'fa-chart-pie' },
                { id: 'wallet', label: 'Transfers & Activity', icon: 'fa-wallet' },
                { id: 'referrals', label: 'Partner Program', icon: 'fa-users' },
                { id: 'profile', label: 'Account Settings', icon: 'fa-user-circle' },
                { id: 'support', label: 'Help & Support', icon: 'fa-headset' },
            ];

            return (
                <div className="min-h-screen flex overflow-hidden bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-emerald-50 via-slate-50 to-emerald-100/50 dark:from-slate-900 dark:via-slate-950 dark:to-emerald-950/20">
                    
                    {/* Dynamic Alert Toasts */}
                    <div className="fixed top-4 right-4 z-[9999] space-y-3 flex flex-col items-end">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`animate-slide-in-right flex items-center space-x-3 px-4 py-3 rounded-xl shadow-lg border ${
                                toast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800 dark:bg-emerald-900/30 dark:border-emerald-800 dark:text-emerald-300' :
                                'bg-blue-50 border-blue-200 text-blue-800 dark:bg-blue-900/30 dark:border-blue-800 dark:text-blue-300'
                            }`}>
                                <i className={`fas ${toast.type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} text-lg`}></i>
                                <span className="font-medium text-sm">{toast.message}</span>
                            </div>
                        ))}
                    </div>

                    {/* Left Sidebar Layout */}
                    <aside className="hidden md:flex flex-col w-66 glass border-r border-emerald-100/40 dark:border-slate-800/50 z-20 relative transition-all duration-300">
                        <div className="p-6 flex justify-between items-center group">
                            <div className="flex items-center space-x-3 cursor-pointer hover:scale-[1.02] transition-transform">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center shadow-lg shadow-emerald-500/30">
                                    <i className="fas fa-chart-line text-white text-lg"></i>
                                </div>
                                <span className="text-xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-900 to-slate-700 dark:from-white dark:to-emerald-400 tracking-tight">
                                    Zennith Capital
                                </span>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-4 space-y-2">
                            {navItems.map((item, index) => {
                                const isActive = activeTab === item.id;
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 text-sm font-semibold animate-fade-in-up ${
                                            isActive 
                                                ? 'bg-emerald-500 text-white shadow-md shadow-emerald-500/20' 
                                                : 'text-slate-600 dark:text-slate-400 hover:bg-emerald-50/50 dark:hover:bg-slate-800/40 hover:text-emerald-800 dark:hover:text-emerald-300'
                                        }`}
                                        style={{ animationDelay: `${index * 50}ms` }}
                                    >
                                        <i className={`fas ${item.icon} w-5 text-center ${isActive ? 'text-white' : 'opacity-70 group-hover:opacity-100'}`}></i>
                                        <span>{item.label}</span>
                                    </button>
                                );
                            })}
                        </nav>

                        <div className="p-4 border-t border-emerald-100/30 dark:border-slate-800/50">
                            <button 
                                onClick={() => setIsDark(!isDark)}
                                className="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-emerald-500/5 dark:bg-slate-800/50 hover:bg-emerald-500/10 dark:hover:bg-slate-700/50 transition-colors text-sm font-semibold text-emerald-800 dark:text-emerald-400"
                            >
                                <div className="flex items-center space-x-3">
                                    <i className={`fas ${isDark ? 'fa-sun' : 'fa-moon'} w-5 text-center`}></i>
                                    <span>{isDark ? 'Light Mode' : 'Dark Theme'}</span>
                                </div>
                            </button>
                        </div>
                    </aside>

                    {/* Mobile Navigation Header */}
                    <div className="md:hidden fixed top-0 left-0 right-0 h-16 glass border-b border-emerald-100/30 dark:border-slate-800/50 z-50 flex items-center justify-between px-4">
                        <div className="flex items-center space-x-2">
                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center">
                                <i className="fas fa-chart-line text-white text-sm"></i>
                            </div>
                            <span className="text-lg font-bold tracking-tight text-slate-900 dark:text-white">Zennith Capital</span>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button onClick={() => setIsDark(!isDark)} className="text-slate-600 dark:text-slate-400">
                                <i className={`fas ${isDark ? 'fa-sun' : 'fa-moon'} text-lg`}></i>
                            </button>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-slate-600 dark:text-slate-400 transition-colors">
                                <i className={`fas ${isMobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i>
                            </button>
                        </div>
                    </div>

                    {}
                    {isMobileMenuOpen && (
                        <div className="md:hidden fixed inset-0 top-16 glass z-40 p-4 animate-fade-in-up">
                            <nav className="space-y-2">
                                {navItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center space-x-3 px-4 py-4 rounded-xl transition-colors font-bold ${
                                            activeTab === item.id ? 'bg-emerald-500 text-white' : 'text-slate-600 dark:text-slate-300 hover:bg-emerald-50 dark:hover:bg-slate-800'
                                        }`}
                                    >
                                        <i className={`fas ${item.icon} w-5 text-center`}></i>
                                        <span>{item.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    )}

                    {/* Main Workspace Frame */}
                    <main className="flex-1 flex flex-col h-screen overflow-y-auto overflow-x-hidden pt-16 md:pt-0 relative">
                        <div className="flex-1 p-6 lg:p-10 max-w-7xl mx-auto w-full relative z-10">
                            
                            <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-6 animate-fade-in-up">
                                <div>
                                    <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight">
                                        {activeTab === 'dashboard' && 'Portfolio Overview'}
                                        {activeTab === 'wallet' && 'Liquidity Management'}
                                        {activeTab === 'referrals' && 'Partner Program'}
                                        {activeTab === 'profile' && 'Account Settings'}
                                        {activeTab === 'support' && 'Help & Support'}
                                    </h1>
                                    <p className="text-slate-500 dark:text-slate-400 text-sm md:text-base max-w-2xl">
                                        {activeTab === 'dashboard' && 'Real-time performance tracking of your algorithmic yields.'}
                                        {activeTab === 'wallet' && 'Manage your liquidity, view transaction history, and initiate secure transfers.'}
                                        {activeTab === 'referrals' && 'Invite partners to earn 10% commission generated directly from their profits.'}
                                        {activeTab === 'profile' && 'Manage your profile, security preferences, and compliance status.'}
                                        {activeTab === 'support' && 'Get in touch with our Telegram support team for assistance.'}
                                    </p>
                                </div>
                                
                                {activeTab === 'dashboard' && (
                                    <div className="flex space-x-3">
                                        <button 
                                            onClick={() => setIsDepositModalOpen(true)}
                                            className="px-5 py-2.5 bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white text-sm font-semibold rounded-xl shadow-lg shadow-emerald-500/25 transition-all hover:scale-[1.03] flex items-center space-x-2"
                                        >
                                            <i className="fas fa-arrow-down"></i>
                                            <span>Deposit</span>
                                        </button>
                                        <button 
                                            onClick={() => setIsWithdrawModalOpen(true)}
                                            className="px-5 py-2.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-semibold rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm transition-all hover:scale-[1.03] flex items-center space-x-2"
                                        >
                                            <i className="fas fa-arrow-up"></i>
                                            <span>Withdraw</span>
                                        </button>
                                    </div>
                                )}
                            </header>

                            {}
                            <div className="relative">
                                {activeTab === 'dashboard' && (
                                    <DashboardView 
                                        balance={balance} 
                                        dailyProfit={dailyProfit} 
                                        totalProfit={totalProfit} 
                                        recentTrades={recentTrades} 
                                        daysLeft={daysLeft}
                                        lockProgress={lockProgress}
                                        chartHistory={chartHistory}
                                        isDark={isDark}
                                    />
                                )}
                                {activeTab === 'wallet' && (
                                    <WalletView 
                                        balance={balance} 
                                        totalProfit={totalProfit}
                                        transactions={transactions}
                                        onOpenDeposit={() => setIsDepositModalOpen(true)}
                                        onOpenWithdraw={() => setIsWithdrawModalOpen(true)}
                                        availableAmount={availableAmount}
                                        lockedAmount={lockedAmount}
                                        activeContracts={activeContracts}
                                    />
                                )}
                                {activeTab === 'referrals' && <ReferralView />}
                                {activeTab === 'profile' && <ProfileView />}
                                {activeTab === 'support' && <SupportView />}
                            </div>
                        </div>
                    </main>

                    {/* Interactive Functional Modals */}
                    <DepositModal 
                        isOpen={isDepositModalOpen} 
                        onClose={() => setIsDepositModalOpen(false)} 
                    />
                    <WithdrawModal 
                        isOpen={isWithdrawModalOpen} 
                        onClose={() => setIsWithdrawModalOpen(false)} 
                        availableAmount={availableAmount}
                        lockedAmount={lockedAmount}
                    />
                </div>
            );
        }

        // --- STREAMING_CHUNK: Designing Fresh Portfolio Dashboard View ---
        function DashboardView({ balance, dailyProfit, totalProfit, recentTrades, daysLeft, lockProgress, chartHistory, isDark }) {
            return (
                <div className="space-y-6">
                    
                    {/* Visual Highlights Stats Row */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard 
                            title="Total Net Asset Value" 
                            value={formatCurrency(balance)} 
                            icon="fa-wallet" 
                            color="brand"
                            subtitle={<span className="text-emerald-600 dark:text-emerald-400 flex items-center text-xs font-bold bg-emerald-500/10 px-2.5 py-1 rounded-md w-fit"><i className="fas fa-check-circle mr-1.5"></i>Starter Contract Active</span>}
                            delay="0"
                        />
                        <StatCard 
                            title="Intraday Est. Yield" 
                            value="USDT Pending" 
                            icon="fa-bolt" 
                            color="emerald"
                            valueColor="text-amber-500 dark:text-amber-400"
                            subtitle={<span className="text-slate-500 dark:text-slate-400 text-xs">Awaiting first cycle calculation</span>}
                            delay="delay-100"
                        />
                        <StatCard 
                            title="Cumulative Returns" 
                            value={formatCurrency(totalProfit)} 
                            icon="fa-chart-line" 
                            color="indigo"
                            subtitle={
                                <div className="w-full mt-2">
                                    <div className="flex justify-between text-xs text-slate-500 dark:text-slate-400 mb-1">
                                        <span>Yield Generation</span>
                                        <span className="text-emerald-500 flex items-center"><i className="fas fa-circle text-[8px] mr-1 animate-pulse"></i> Initializing</span>
                                    </div>
                                    <div className="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-1.5 overflow-hidden relative">
                                        <div className="absolute top-0 left-0 h-full bg-emerald-500 w-full animate-pulse opacity-55"></div>
                                    </div>
                                </div>
                            }
                            delay="delay-200"
                        />
                        <StatCard 
                            title="Vesting Lock Period" 
                            value={`${daysLeft} Days`} 
                            icon="fa-lock" 
                            color="amber"
                            subtitle={
                                <div className="w-full mt-2">
                                    <div className="flex justify-between text-xs text-slate-500 dark:text-slate-400 mb-1">
                                        <span>Vesting Progress</span>
                                        <span>{lockProgress.toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-1.5 overflow-hidden">
                                        <div className="h-full rounded-full transition-all duration-1000 bg-emerald-500" style={{ width: `${Math.max(1, lockProgress)}%` }} />
                                    </div>
                                </div>
                            }
                            delay="delay-300"
                        />
                    </div>

                    {/* Integrated Chart Panel */}
                    <div className="glass rounded-2xl p-6 border border-emerald-500/10 dark:border-slate-800/50 shadow-sm animate-fade-in-up delay-200">
                        <div className="flex items-center justify-between mb-4">
